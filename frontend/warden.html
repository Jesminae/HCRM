<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Dashboard - Hostel Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div>
                <h2>Warden Dashboard</h2>
                <p>Welcome, <span id="userName">User</span></p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="openPasswordModal()" class="btn" style="border: 1px solid var(--border-color); background: white;">Change Password</button>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>

        <div class="grid-2">
            <!-- Set Fees -->
            <div class="card">
                <h3>Set Per-Day Meal Fee</h3>
                <form id="feeForm" style="margin-top: 1rem;">
                    <div class="form-group" style="display: flex; gap: 1rem;">
                        <div style="flex: 1;">
                            <label>Select Month</label>
                            <input type="month" id="feeMonth" required>
                        </div>
                        <div style="flex: 1;">
                            <label>Hostel Group</label>
                            <select id="feeGroup">
                                <option value="ALL">All (Global)</option>
                                <option value="LHA&C">LHA & C</option>
                                <option value="LHB">LHB</option>
                                <option value="MHA">MHA</option>
                                <option value="MHB">MHB</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Per Day Rate (₹)</label>
                        <input type="number" step="0.01" id="feeRate" required>
                    </div>
                    <div id="feeMsg" class="error-msg"></div>
                    <button type="submit" class="btn btn-primary">Save Fee Structure</button>
                </form>
            </div>

            <!-- View Student Data -->
            <div class="card">
                <h3>Student Monthly Report</h3>
                <div class="form-group" style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label>Select Month</label>
                        <input type="month" id="reportMonth" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Hostel Group</label>
                        <select id="reportGroup">
                            <option value="ALL">All Groups</option>
                            <option value="LHA&C">LHA & C</option>
                            <option value="LHB">LHB</option>
                            <option value="MHA">MHA</option>
                            <option value="MHB">MHB</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Hostel Type</label>
                        <select id="reportHostelType">
                            <option value="ALL">All Types</option>
                            <option value="LH">LH</option>
                            <option value="MH">MH</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="loadStudentReport()">View Report</button>
                </div>

                <div style="margin-top: 1.5rem;">
                    <h4>Fee Structure for selected month: ₹<span id="displayRate">0</span> / day</h4>
                    <table id="reportTable">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Block/Room</th>
                                <th>Type</th>
                                <th>Total Meals</th>
                                <th>Total Fee (₹)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="grid-2" style="margin-top: 1.5rem;">
            <!-- Attendance Review -->
            <div class="card">
                <div class="flex-between" style="border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                    <h3>Daily Attendance Review</h3>
                    <div style="display: flex; gap: 1rem;">
                        <input type="date" id="attReviewDate" class="btn" style="background:#fff; border: 1px solid var(--border-color); color:var(--text-color);">
                        <button class="btn btn-primary" onclick="loadAttendanceReview()">View</button>
                    </div>
                </div>
                
                <div id="attendanceTablesContainer" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Tables injected via JS -->
                </div>
            </div>

            <!-- Manage Complaints -->
            <div class="card">
                <h3>Manage Complaints</h3>
                <div class="form-group" style="display: flex; gap: 1rem; align-items: flex-end; margin-top: 1rem; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label>Category</label>
                        <select id="filterCategory">
                            <option value="ALL">All Categories</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Cleaning">Cleaning</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Hostel Type</label>
                        <select id="filterType">
                            <option value="ALL">All Types</option>
                            <option value="LH">LH</option>
                            <option value="MH">MH</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Block</label>
                        <select id="filterBlock">
                            <option value="ALL">All Blocks</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="loadComplaints()">Filter</button>
                </div>
                <table id="manageComplaintsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Student</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>State</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/warden.js"></script>
</body>
</html>
